# score-assistant-service-manifest.yaml
# Specification Version: 2026.Q2
# Governance: Strict Architectural Compliance

service_name: "score-assistant"
architecture: "Hexagonal"
adapters:
  # ── Primary — REST (adapter.in.web.rest) ───────────────────────
  - name: "SemesterRestControllerAdapter"
    type: "Primary"
    tech: "Spring WebFlux + Reactor Netty"
    stereotype: "<<RestController>>"
    port:
      interface: "SemesterRestController"
      layer: "domain.ports.input"

  - name: "ClassRestControllerAdapter"
    type: "Primary"
    tech: "Spring WebFlux + Reactor Netty"
    stereotype: "<<RestController>>"
    port:
      interface: "ClassRestController"
      layer: "domain.ports.input"

  - name: "StudentRestControllerAdapter"
    type: "Primary"
    tech: "Spring WebFlux + Reactor Netty"
    stereotype: "<<RestController>>"
    port:
      interface: "StudentRestController"
      layer: "domain.ports.input"

  - name: "GradeItemRestControllerAdapter"
    type: "Primary"
    tech: "Spring WebFlux + Reactor Netty"
    stereotype: "<<RestController>>"
    port:
      interface: "GradeItemRestController"
      layer: "domain.ports.input"

  - name: "GradeRecordRestControllerAdapter"
    type: "Primary"
    tech: "Spring WebFlux + Reactor Netty"
    stereotype: "<<RestController>>"
    port:
      interface: "GradeRecordRestController"
      layer: "domain.ports.input"

  - name: "AttachmentRestControllerAdapter"
    type: "Primary"
    tech: "Spring WebFlux + Reactor Netty"
    stereotype: "<<RestController>>"
    port:
      interface: "AttachmentRestController"
      layer: "domain.ports.input"

  # ── Primary — GraphQL (adapter.in.web.graphql) ──────────────────
  - name: "SemesterGraphQLResolverAdapter"
    type: "Primary"
    tech: "Spring for GraphQL + Reactor Netty"
    stereotype: "<<GraphQLResolver>>"
    port:
      interface: "SemesterGraphQLResolver"
      layer: "domain.ports.input"

  - name: "ClassGraphQLResolverAdapter"
    type: "Primary"
    tech: "Spring for GraphQL + Reactor Netty"
    stereotype: "<<GraphQLResolver>>"
    port:
      interface: "ClassGraphQLResolver"
      layer: "domain.ports.input"

  - name: "StudentGraphQLResolverAdapter"
    type: "Primary"
    tech: "Spring for GraphQL + Reactor Netty"
    stereotype: "<<GraphQLResolver>>"
    port:
      interface: "StudentGraphQLResolver"
      layer: "domain.ports.input"

  - name: "GradeItemGraphQLResolverAdapter"
    type: "Primary"
    tech: "Spring for GraphQL + Reactor Netty"
    stereotype: "<<GraphQLResolver>>"
    port:
      interface: "GradeItemGraphQLResolver"
      layer: "domain.ports.input"

  - name: "GradeRecordGraphQLResolverAdapter"
    type: "Primary"
    tech: "Spring for GraphQL + Reactor Netty"
    stereotype: "<<GraphQLResolver>>"
    port:
      interface: "GradeRecordGraphQLResolver"
      layer: "domain.ports.input"

  - name: "AttachmentGraphQLResolverAdapter"
    type: "Primary"
    tech: "Spring for GraphQL + Reactor Netty"
    stereotype: "<<GraphQLResolver>>"
    port:
      interface: "AttachmentGraphQLResolver"
      layer: "domain.ports.input"

  # ── Primary — Application Services (application.port.in) ────────
  - name: "StudentCommandServiceAdapter"
    type: "Primary"
    tech: "Project Reactor"
    stereotype: "<<Service>>"
    port:
      interface: "StudentCommandService"
      layer: "domain.ports.input"

  - name: "StudentQueryServiceAdapter"
    type: "Primary"
    tech: "Project Reactor"
    stereotype: "<<Service>>"
    port:
      interface: "StudentQueryService"
      layer: "domain.ports.input"

  - name: "GradeItemCommandServiceAdapter"
    type: "Primary"
    tech: "Project Reactor"
    stereotype: "<<Service>>"
    port:
      interface: "GradeItemCommandService"
      layer: "domain.ports.input"

  - name: "GradeItemQueryServiceAdapter"
    type: "Primary"
    tech: "Project Reactor"
    stereotype: "<<Service>>"
    port:
      interface: "GradeItemQueryService"
      layer: "domain.ports.input"

  # ── Secondary — Persistence (adapter.out.persistence) ───────────
  - name: "SemesterRepositoryAdapter"
    type: "Secondary"
    tech: "Spring Data R2DBC (H2)"
    stereotype: "<<Repository>>"
    port:
      interface: "SemesterRepository"
      layer: "domain.ports.output"

  - name: "ClassRepositoryAdapter"
    type: "Secondary"
    tech: "Spring Data R2DBC (H2)"
    stereotype: "<<Repository>>"
    port:
      interface: "ClassRepository"
      layer: "domain.ports.output"

  - name: "StudentRepositoryAdapter"
    type: "Secondary"
    tech: "Spring Data R2DBC (H2)"
    stereotype: "<<Repository>>"
    port:
      interface: "StudentRepository"
      layer: "domain.ports.output"

  - name: "GradeItemRepositoryAdapter"
    type: "Secondary"
    tech: "Spring Data R2DBC (H2)"
    stereotype: "<<Repository>>"
    port:
      interface: "GradeItemRepository"
      layer: "domain.ports.output"

  - name: "GradeRecordRepositoryAdapter"
    type: "Secondary"
    tech: "Spring Data R2DBC (H2)"
    stereotype: "<<Repository>>"
    port:
      interface: "GradeRecordRepository"
      layer: "domain.ports.output"

  - name: "AttachmentRepositoryAdapter"
    type: "Secondary"
    tech: "Spring Data R2DBC (H2)"
    stereotype: "<<Repository>>"
    port:
      interface: "AttachmentRepository"
      layer: "domain.ports.output"
