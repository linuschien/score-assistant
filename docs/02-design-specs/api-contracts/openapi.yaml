components:
  responses:
    400BadRequest:
      description: Invalid request payload or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    404NotFound:
      description: Requested resource could not be found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    409Conflict:
      description: Optimistic locking conflict detected
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConflictError'

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: "Validation failed"
      required:
        - code
        - message

    ConflictError:
      type: object
      properties:
        code:
          type: integer
          example: 409
        message:
          type: string
          example: "Optimistic locking conflict: version mismatch"
        currentVersion:
          type: integer
          example: 2
      required:
        - code
        - message

    Semester:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "d3b07384-d113-404c-9f8a-020524032a9a"
        semester_name:
          type: string
          example: "2026-Fall"
        start_date:
          type: string
          format: date-time
          example: "2026-09-01T00:00:00Z"
        end_date:
          type: string
          format: date-time
          example: "2027-01-31T23:59:59Z"
      required:
        - id
        - semester_name
        - start_date
        - end_date

    SemesterRequest:
      type: object
      properties:
        semester_name:
          type: string
          example: "2026-Fall"
        start_date:
          type: string
          format: date-time
          example: "2026-09-01T00:00:00Z"
        end_date:
          type: string
          format: date-time
          example: "2027-01-31T23:59:59Z"
      required:
        - semester_name
        - start_date
        - end_date

    SemesterPatchRequest:
      type: object
      properties:
        semester_name:
          type: string
          example: "2026-Fall"
        start_date:
          type: string
          format: date-time
          example: "2026-09-01T00:00:00Z"
        end_date:
          type: string
          format: date-time
          example: "2027-01-31T23:59:59Z"

    Class:
      type: object
      properties:
