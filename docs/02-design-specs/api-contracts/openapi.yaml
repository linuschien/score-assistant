openapi: 3.2.0
info:
  title: Score Assistant API Specification
  version: 1.0.0
  description: Hardened OpenAPI 3.2.0 specification derived from Core Domain model for the Score Assistant module. Enforces strict REST boundaries, UUID identifiers, CQRS compatibility, and GraphQL query gateway redirection.
