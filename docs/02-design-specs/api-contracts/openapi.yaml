components:
  responses:
    400BadRequest:
      description: Invalid request payload or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    404NotFound:
      description: Requested resource could not be found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    409Conflict:
      description: Optimistic locking conflict detected
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ConflictError'

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: "Validation failed"
      required:
        - code
        - message

    ConflictError:
      type: object
      properties:
        code:
          type: integer
          example: 409
        message:
          type: string
          example: "Optimistic locking conflict: version mismatch"
        currentVersion:
          type: integer
          example: 2
      required:
        - code
        - message

    Semester:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "d3b07384-d113-404c-9f8a-020524032a9a"
        semesterName:
          type: string
          example: "2026-Fall"
        startDate:
          type: string
          format: date
          example: "2026-09-01"
        endDate:
          type: string
          format: date
